<!--
  auth.component.html

  Template para el componente de autenticación/login.
  - Formulario centrado en la pantalla
  - Campo email y password con validación
  - Toggle de visibilidad de contraseña
  - Selector de proyecto
  - Responsivo y adaptable a dispositivos móviles
-->

<main class="auth-container">
  <!-- Contenedor principal de la tarjeta de login -->
  <div class="auth-card">
    <!-- Cabecera con logo y branding -->
    <div class="auth-header">
      <div class="logo-wrapper">
        <img 
          src="assets/logoSWO_sinFondo.png" 
          alt="Logo SWO" 
          class="logo-img"
          onerror="this.classList.add('hidden')"
        />
        <span class="logo-fallback">SWO</span>
      </div>
      <div class="header-text">
        <h1 class="title">Autenticación Segura</h1>
        <p class="subtitle">Accede con tus credenciales protegidas para gestionar incidencias, usuarios y reportes.</p>
      </div>
    </div>

    <!-- Formulario de login -->
    <form (ngSubmit)="onSubmit($event)" class="auth-form">
      <!-- Mensaje de error si existe -->
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <!-- Campo de correo electrónico -->
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="correo@ejemplo.com"
          class="form-input"
          required
          [disabled]="isLoading"
        />
      </div>

      <!-- Campo de contraseña con toggle de visibilidad -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            class="form-input"
            required
            [disabled]="isLoading"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
            [disabled]="isLoading"
            aria-label="Alternar visibilidad de contraseña"
          >
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <!-- Botón de envío -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="isLoading"
      >
        {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <!-- Información adicional -->
    <div class="auth-footer">
      <p class="small-text">Credenciales de prueba:</p>
      <p class="small-text">Email: <code>administrador&#64;swo.com</code></p>
      <p class="small-text">Password: <code>123456</code></p>
    </div>
  </div>
</main>
