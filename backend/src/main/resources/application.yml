# =====================================================
#  SWO API - Configuración de Spring Boot
#  Perfil: desarrollo (localhost)
# =====================================================

server:
  port: 8081
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ─────────────────────────────────────────────────────
# DATASOURCE - MySQL (misma BD que el módulo Servlet)
# ─────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/swo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&characterEncoding=UTF-8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      pool-name: SwoHikariPool

  # ───────────────────────────────────────────────────
  # JPA / HIBERNATE
  # ───────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none               # No intenta modificar el esquema (recomendado para producción)
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  # ───────────────────────────────────────────────────
  # JACKSON - Serialización JSON
  # ───────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Bogota

# ─────────────────────────────────────────────────────
# SPRINGDOC / SWAGGER UI
# ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

# ─────────────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────────────
logging:
  level:
    com.swo.api: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
