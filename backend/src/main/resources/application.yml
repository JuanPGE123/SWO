# =====================================================
#  SWO API - Configuración de Spring Boot
#  Perfil: desarrollo (localhost)
# =====================================================

server:
  port: 8081
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# ─────────────────────────────────────────────────────
# DATASOURCE
# Railway inyecta: MYSQLHOST, MYSQLPORT, MYSQLDATABASE,
#                  MYSQLUSER, MYSQLPASSWORD
# Localmente usa los valores por defecto (después de ':')
# ─────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQL_DATABASE:swo_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota&characterEncoding=UTF-8
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: SwoHikariPool
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      # max-lifetime debe ser menor que el wait_timeout del servidor MySQL.
      # Railway usa 3600 s (1 h); ponemos 1800 s (30 min) con margen.
      max-lifetime: 1800000
      # Mantiene vivas las conexiones inactivas para evitar CommunicationsException
      keepalive-time: 60000
      # Valida la conexión antes de entregarla al pool
      connection-test-query: SELECT 1

  # ───────────────────────────────────────────────────
  # JPA / HIBERNATE
  # ───────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        use_sql_comments: false

  # ───────────────────────────────────────────────────
  # JACKSON - Serialización JSON
  # ───────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/Bogota

# ─────────────────────────────────────────────────────
# SPRINGDOC / SWAGGER UI
# ─────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

# ─────────────────────────────────────────────────────
# LOGGING
# ─────────────────────────────────────────────────────
logging:
  level:
    com.swo.api: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
