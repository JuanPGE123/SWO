<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Incidencia - SWO</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        select {
            cursor: pointer;
            background-color: white;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .required {
            color: #e74c3c;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
        }
        
        .nav-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 10px;
            font-size: 14px;
        }
        
        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Registro de Incidencia</h1>
        <p class="subtitle">Complete el formulario para reportar una nueva incidencia</p>
        
        <form action="IncidenciaServlet" method="POST">
            <div class="form-group">
                <label for="titulo">T&iacute;tulo <span class="required">*</span></label>
                <input type="text" id="titulo" name="titulo" required 
                       placeholder="Ej: Error en sistema de autenticaci&oacute;n" maxlength="200">
            </div>
            
            <div class="form-group">
                <label for="descripcion">Descripci&oacute;n <span class="required">*</span></label>
                <textarea id="descripcion" name="descripcion" required 
                          placeholder="Describa detalladamente la incidencia, pasos para reproducirla y comportamiento esperado..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="estado">Estado <span class="required">*</span></label>
                    <select id="estado" name="estado" required>
                        <option value="">-- Seleccione --</option>
                        <option value="Abierto" selected>Abierto</option>
                        <option value="En Progreso">En Progreso</option>
                        <option value="Cerrado">Cerrado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="impacto">Impacto</label>
                    <select id="impacto" name="impacto">
                        <option value="Bajo">Bajo</option>
                        <option value="Medio" selected>Medio</option>
                        <option value="Alto">Alto</option>
                        <option value="Critico">Cr&iacute;tico</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="ubicacion">Ubicaci&oacute;n / &Aacute;rea afectada</label>
                <input type="text" id="ubicacion" name="ubicacion"
                       placeholder="Ej: Piso 2 - Sala de servidores, Departamento de Ventas">
            </div>
                    <option value="Abierto" selected>Abierto</option>
                    <option value="En Progreso">En Progreso</option>
                    <option value="Cerrado">Cerrado</option>
                </select>
            </div>
            
            <input type="hidden" name="idUsuarioReporta" value="1">
            
            <div class="btn-group">
                <button type="submit">&#10003; Registrar Incidencia</button>
                <button type="reset" class="btn-secondary">&#8635; Limpiar</button>
            </div>
        </form>
        
        <div class="nav-links">
            <a href="IncidenciaServlet">Ver todas las incidencias</a> |
            <a href="index.html">Inicio</a> |
            <a href="registroUsuario.html">Gestionar Usuarios</a>
        </div>
    </div>
</body>
</html>
