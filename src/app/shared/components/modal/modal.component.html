<div *ngIf="isOpen" class="modal-overlay" (click)="onBackdropClick()">
  <div
    #modalContainer
    [class]="getModalClasses()"
    (click)="onModalContentClick($event)"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="title ? 'modal-title' : undefined"
  >
    <!-- Header -->
    <div *ngIf="showHeader" class="modal-header">
      <h2 *ngIf="title" id="modal-title" class="modal-title">{{ title }}</h2>
      <button
        *ngIf="showCloseButton"
        type="button"
        class="modal-close-button"
        (click)="close()"
        aria-label="Cerrar modal"
      >
        <span aria-hidden="true">✕</span>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <ng-content select="[body]"></ng-content>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <ng-content select="[footer]"></ng-content>
    </div>
  </div>
</div>
